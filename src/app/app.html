<h3>{{ title() }}</h3>
<div>
    <button class="btn btn--start" type="button" (click)="scan()">Start Scanning</button>
</div>

<div class="scan-results">
  <h3>Scan Results:</h3>
  @if (barcodes().length > 0)
  {
    <ul>
      @for (barcode of barcodes(); track barcode)
      {
        <li>{{ barcode }}</li>
      }
    </ul>
  }
</div>
